<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>未命名 AI看板</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: rgba(13, 24, 43, 0.82);
        --panel-border: rgba(125, 211, 252, 0.22);
        --text: #eff6ff;
        --muted: rgba(220, 232, 255, 0.74);
        --accent: #7dd3fc;
        --danger: #fca5a5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top right, rgba(34, 211, 238, 0.18), transparent 26%),
          radial-gradient(circle at left center, rgba(59, 130, 246, 0.14), transparent 34%),
          linear-gradient(180deg, #06101d 0%, #0a1526 100%);
        color: var(--text);
        font-family:
          'PingFang SC',
          'Microsoft YaHei',
          sans-serif;
      }

      body {
        min-height: 100vh;
      }

      code,
      pre {
        font-family:
          'SFMono-Regular',
          Consolas,
          monospace;
      }

      #root {
        min-height: 100vh;
      }

      [data-ai-board-preview-root][hidden] {
        display: none !important;
      }

      .ai-board-preview-shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 40px 24px 64px;
      }

      .ai-board-preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 24px;
      }

      .ai-board-preview-card {
        padding: 28px;
        backdrop-filter: blur(16px);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        box-shadow: 0 18px 80px rgba(6, 16, 29, 0.3);
      }

      .ai-board-preview-card h1,
      .ai-board-preview-card h2 {
        margin: 0;
      }

      .ai-board-preview-eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .ai-board-preview-copy {
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .ai-board-preview-error-copy {
        color: var(--danger);
      }

      .ai-board-preview-error-panel[hidden] {
        display: none;
      }

      .ai-board-preview-code {
        margin: 16px 0 0;
        padding: 16px;
        min-height: 180px;
        overflow: auto;
        border-radius: 18px;
        background: rgba(5, 10, 20, 0.72);
        border: 1px solid rgba(125, 211, 252, 0.14);
        color: #dbeafe;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      @media (max-width: 768px) {
        .ai-board-preview-shell {
          padding: 24px 16px 40px;
        }

        .ai-board-preview-card {
          border-radius: 20px;
        }
      }
    </style>
    <script type="module" src="/api/visdocs/_runtime/ai-board-preview.js"></script>
  </head>
  <body>
    <div id="root" data-ai-board-preview-root hidden></div>
    <main class="ai-board-preview-shell" data-ai-board-preview-shell>
      <section class="ai-board-preview-card">
        <p class="ai-board-preview-eyebrow">Zmetaboard AI看板</p>
        <h1 data-ai-board-preview-title>正在编译 AI看板</h1>
        <p class="ai-board-preview-copy" data-ai-board-preview-detail>
          浏览器会读取当前 AI看板源码、编译 TSX，并根据 TSX 中的 Tailwind utility classes 生成样式。
        </p>
      </section>

      <section class="ai-board-preview-grid">
        <article class="ai-board-preview-card">
          <h2>固定入口</h2>
          <pre class="ai-board-preview-code">src/main.tsx
src/App.tsx
src/index.css
src/components/*</pre>
        </article>
      </section>

      <section
        class="ai-board-preview-card ai-board-preview-error-panel"
        data-ai-board-preview-error-panel
        hidden
      >
        <h2>编译失败</h2>
        <p
          class="ai-board-preview-copy ai-board-preview-error-copy"
          data-ai-board-preview-error-summary
        >
          浏览器暂时无法完成这次源码编译。
        </p>
        <pre class="ai-board-preview-code" data-ai-board-preview-error-detail></pre>
      </section>
    </main>
  </body>
</html>
